<body class="bg-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        // ==========================================
        // 圖示庫 (原生 SVG)

        const IconBase = ({ children, className = "w-6 h-6", fill = "none" }) => (
          <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

          </svg>

        const UploadCloud = ({ className }) => <IconBase className={className}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></IconBase>;
        const CheckCircle = ({ className }) => <IconBase className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>;
        const XCircle = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></IconBase>;
        const Clock = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>;
        const PlaneTakeoff = ({ className }) => <IconBase className={className}><path d="M2 22h20"/><path d="M6.36 17.4 4 17l-2-4 1.1-.55a2 2 0 0 1 1.8 0l.17.1a2 2 0 0 0 1.8 0L8 12l5-5 1.5-1.5a2.5 2.5 0 1 1 3.53 3.53L16.5 10.5 12 14l-.4 1.6 4.3 2.15a2 2 0 0 1 1.05 1.74v.01c-.01.54-.42.98-.96 1L6.36 17.4Z"/></IconBase>;
        const PlaneLanding = ({ className }) => <IconBase className={className}><path d="M2 22h20"/><path d="M13.4 17.2 16 17l2-4-1.1-.55a2 2 0 0 0-1.8 0l-.17.1a2 2 0 0 1-1.8 0L12 12l-5-5-1.5-1.5a2.5 2.5 0 1 0-3.53 3.53L3.5 10.5 8 14l.4 1.6-4.3 2.15a2 2 0 0 0-1.05 1.74v.01c.01.54.42.98.96 1l9.63 1.6Z"/></IconBase>;

        const ChevronDown = ({ className }) => <IconBase className={className}><polyline points="6 9 12 15 18 9"/></IconBase>;
        const ChevronUp = ({ className }) => <IconBase className={className}><polyline points="18 15 12 9 6 15"/></IconBase>;
        const AlertOctagon = ({ className }) => <IconBase className={className}><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconBase>;
        const MapIcon = ({ className }) => <IconBase className={className}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></IconBase>;
        const MountainSnow = ({ className }) => <IconBase className={className}><path d="m8 3 4 8 5-5 5 15H2L8 3z"/><path d="M4.14 15.08c2.62-1.57 5.24-1.43 7.86.42 2.74 1.94 5.49 2 8.24.19"/></IconBase>;
        const Target = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconBase>;
        const LightbulbOff = ({ className }) => <IconBase className={className}><path d="M16.8 9.2c-.5-1.9-2-3.4-3.9-3.9"/><path d="m2 2 20 20"/><path d="M8.8 3.2c1.9-.5 4.3.1 5.8 1.6"/><path d="M9 18h6"/><path d="M10 22h4"/><path d="M5.3 10.6c-.6 1-.9 2.2-.9 3.4 0 3.2 2.8 5 4.6 6h6"/></IconBase>;
        const Fuel = ({ className }) => <IconBase className={className}><line x1="3" x2="15" y1="22" y2="22"/><line x1="4" x2="14" y1="9" y2="9"/><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"/><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2h0a2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"/></IconBase>;
        const Weight = ({ className }) => <IconBase className={className}><circle cx="12" cy="5" r="3"/><path d="M6.5 8a2 2 0 0 0-1.905 1.46L2.1 18.5A2 2 0 0 0 4 21h16a2 2 0 0 0 1.925-2.54L19.4 9.5A2 2 0 0 0 17.5 8z"/></IconBase>;
        const Wind = ({ className }) => <IconBase className={className}><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></IconBase>;
        const ChevronRight = ({ className }) => <IconBase className={className}><path d="m9 18 6-6-6-6"/></IconBase>;
        const Upload = ({ className }) => <IconBase className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></IconBase>;
        const FileText = ({ className }) => <IconBase className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></IconBase>;
        const CloudLightning = ({ className }) => <IconBase className={className}><path d="M6 16.326A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 .5 8.973"/><path d="m13 12-3 5h4l-3 5"/></IconBase>;
        const Star = ({ className, fill = "none" }) => <IconBase className={className} fill={fill}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconBase>;
        const Bird = ({ className }) => <IconBase className={className}><path d="M16 7h.01"/><path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20"/><path d="m20 7 2 .5-2 .5"/><path d="M10 18v3"/><path d="M14 17.75V21"/><path d="M7 18a6 6 0 0 0 3.84-10.61"/></IconBase>;
        const SendKite = ({ className }) => <IconBase className={className}><polygon points="3 11 22 2 13 21 11 13 3 11"/></IconBase>;
        const Tractor = ({ className }) => <IconBase className={className}><path d="M3 4h9l1 7"/><path d="M4 11V4"/><path d="M8 10V4"/><path d="M18 5c-.6 0-1 .4-1 1v5.6"/><path d="m10 11 11 .9c.6 0 .9.5.8 1.1l-.8 5h-1"/><circle cx="7" cy="15" r="5"/><circle cx="18" cy="18" r="2"/></IconBase>;
        const Building = ({ className }) => <IconBase className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></IconBase>;
        const CornerUpRight = ({ className }) => <IconBase className={className}><path d="M4 21v-7a4 4 0 0 1 4-4h12"/><polyline points="15 15 20 10 15 5"/></IconBase>;
        const Clipboard = ({ className }) => <IconBase className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></IconBase>;
        const Mic = ({ className }) => <IconBase className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/><line x1="8" x2="16" y1="22" y2="22"/></IconBase>;
        const Shield = ({ className }) => <IconBase className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></IconBase>;

        // ==========================================
        // 威脅與緩解資料結構
        // ==========================================
        const THREATS_DATA = [
            { category: "AIRPORT/RUNWAY", items: ["Contamination", "Construction", "Congestion", "Signage", "Hotspots", "NOTAM"] },
            { category: "ATC", items: ["Clearance", "SID/STAR Amendments", "Radio Congestion", "Non-Standards", "Language Difficulty", "Similar Callsign"] },
            { category: "AIRCRAFT", items: ["MELs/CDLs", "Systems / Equipment", "Automation", "Performance", "Communication"] },
            { category: "ADVERSE WEATHER", items: ["Visibility", "Winds / Windshear", "Precipitation", "Storms", "Cold Weather OPS", "Hot Weather OPS"] },
            { category: "ENVIRONMENT", items: ["Terrain", "Traffic", "Night", "Airport Lighting", "Airfield Elevation"] },
            { category: "GROUND/RAMP", items: ["External Power", "External Air", "Handling", "Tow Truck"] },
            { category: "DISPATCH", items: ["Slot Time", "Delays", "Crew Scheduling", "Manuals / Charts"] },
            { category: "OPERATIONAL", items: ["Time Pressure", "Non-Normal Conditions", "Unfamiliar Airport", "Flight Diversion"] },
            { category: "PHYSIOLOGY", items: ["Fatigue", "Stress", "Hydration", "Nutrition", "Jetlag"] },
            { category: "CREW", items: ["Experience", "Recency", "First flight of the day", "Route Familiarity"] },
            { category: "CABIN", items: ["Passengers", "Events / Distraction", "Interruptions", "Cabin crew"] },
            { category: "OTHER", items: ["Complacency"] }
        ];

        // ==========================================
        // UI 元件：過濾開關
        // ==========================================
        const FilterToggle = ({ active, onClick, icon: Icon, label, activeColorClass, inactiveColorClass, dotColor }) => (
          <div onClick={onClick} className={`flex items-center gap-1.5 border py-1.5 px-3 rounded-lg shadow-sm cursor-pointer transition-colors select-none ${active ? activeColorClass : inactiveColorClass}`}>
            <Icon className={`w-4 h-4 ${active ? '' : 'opacity-60'}`} />
            <label className="text-sm font-bold whitespace-nowrap cursor-pointer">{label}</label>
            <div className={`relative inline-flex h-4 w-7 items-center rounded-full transition-colors ml-1 ${active ? dotColor : 'bg-slate-300'}`}>
              <span className={`inline-block h-3 w-3 transform rounded-full bg-white transition-transform ${active ? 'translate-x-3.5' : 'translate-x-0.5'}`} />
            </div>
          </div>
        );

        // ==========================================
        // 模組：Threats And Mitigation 評估面板
        // ==========================================
        function ThreatsApp({ selectedThreats, onToggle }) {
            return (
                <div className="max-w-6xl mx-auto px-4 mt-6 pb-12">
                    <div className="bg-white rounded-2xl shadow-md overflow-hidden border border-slate-200">
                        <div className="bg-[#4878d0] text-white p-4 text-center font-black text-2xl tracking-wider">
                            THREATS AND MITIGATION
                        </div>
                        <div className="p-4 sm:p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 bg-slate-50">
                            {THREATS_DATA.map((block, idx) => (
                                <div key={idx} className="border border-slate-300 rounded-xl overflow-hidden shadow-sm flex flex-col bg-white">
                                    <div className="bg-[#e6f0ff] border-b border-slate-200 p-2.5 text-center font-black text-slate-800 uppercase tracking-wide">
                                        {block.category}
                                    </div>
                                    <div className="p-3 flex-1 flex flex-col gap-1.5">
                                        {block.items.map(item => {
                                            const isSelected = selectedThreats.some(t => t.category === block.category && t.item === item);
                                            return (
                                                <button
                                                    key={item}
                                                    onClick={() => onToggle(block.category, item)}
                                                    className={`text-left px-3 py-2 rounded-lg text-[15px] transition-all duration-150 flex items-start gap-2.5 outline-none border border-transparent ${
                                                        isSelected 
                                                        ? 'bg-[#b4f25b] text-black font-bold shadow-sm' 
                                                        : 'bg-transparent text-slate-700 hover:bg-slate-100 font-medium'
                                                    }`}
                                                >
                                                    <span className={`mt-1.5 h-1.5 w-1.5 rounded-full shrink-0 ${isSelected ? 'bg-black' : 'bg-slate-400'}`}></span>
                                                    <span className="leading-snug">{item}</span>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 模組 1: Norma Filter v2 (處理顯示邏輯與多重高亮)
        // ==========================================
        function NotamFilterApp({ rawText, onPinnedUpdate }) {
          const [parsedData, setParsedData] = useState(null); 
          const [flightInfo, setFlightInfo] = useState(null); 
          const [activeTab, setActiveTab] = useState('DEP');
          const [showFiltered, setShowFiltered] = useState(true); 
          const [bufferHours, setBufferHours] = useState(1); 
          const [localError, setLocalError] = useState(null);
          const [selectedNotams, setSelectedNotams] = useState([]);

          const [hideObstacles, setHideObstacles] = useState(true);
          const [hideBirds, setHideBirds] = useState(true);
          const [hideUAS, setHideUAS] = useState(true);
          const [hideMowing, setHideMowing] = useState(true);

          useEffect(() => {
            if (onPinnedUpdate && flightInfo) {
              const allNotams = [...(flightInfo.depNotams || []), ...(flightInfo.destNotams || [])];
              const pinned = allNotams.filter(n => selectedNotams.includes(n.id));
              const uniquePinned = Array.from(new Map(pinned.map(item => [item.id, item])).values());
              onPinnedUpdate(uniquePinned);
            }
          }, [selectedNotams, flightInfo]);

          const toggleNotamSelection = (id) => {
            setSelectedNotams(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
          };

          useEffect(() => {
            window.scrollTo({ top: 0, behavior: 'auto' });
          }, [activeTab]);

          useEffect(() => {
            if (!rawText) {
                setParsedData(null); setFlightInfo(null); setLocalError(null); return;
            }
            try {
                const cleanText = sanitizeText(rawText);
                processBriefingText(cleanText);
                setLocalError(null);
            } catch (err) {
                console.error("NOTAM parsing error", err);
                setLocalError("無法在文件中找到完整的航班資訊，NOTAM 模組無法啟用。");
            }
          }, [rawText]);

          const sanitizeText = (raw) => {
            let clean = raw;
            clean = clean.replace(/---\s*PAGE\s*\d+\s*---/gi, '\n');
            clean = clean.replace(/PAGE\s*[\n\r]*\s*\d+\s*[\n\r]*\s*OF\s*[\n\r]*\s*\d+/gi, '\n');
            clean = clean.replace(/\b\d+\s*[\n\r]*\s*OF\s*[\n\r]*\s*\d+\b/gi, '\n');
            clean = clean.replace(/\bPAGE\s*[\n\r]*\s*\d+\b/gi, '\n');
            clean = clean.replace(/BR\s+\d{3}\/\d{2}[A-Za-z]{3}\d{2}\/[A-Z]{3}-[A-Z]{3}.*?OFP:\s*\d+\/\d+\/\d+/gi, '\n');
            clean = clean.replace(/Reg:\s*[A-Z0-9-]+\s*[\n\r]*\s*OFP:\s*\d+\/\d+\/\d+/gi, '\n');
            clean = clean.replace(/\+{5,}\s*[A-Z\s]+\s*\+{5,}/gi, '\n');
            return clean;
          };

          const parseZTime = (dateStr, timeStr) => {
            const months = { JAN: 0, FEB: 1, MAR: 2, APR: 3, MAY: 4, JUN: 5, JUL: 6, AUG: 7, SEP: 8, OCT: 9, NOV: 10, DEC: 11 };
            const dateMatch = dateStr.match(/(\d{2})([A-Z]{3})(\d{2})/i);
            if (!dateMatch) return new Date();
            const day = parseInt(dateMatch[1]); const month = months[dateMatch[2].toUpperCase()]; const year = 2000 + parseInt(dateMatch[3]);
            const hr = parseInt(timeStr.substring(0, 2)); const min = parseInt(timeStr.substring(2, 4));
            return new Date(Date.UTC(year, month, day, hr, min));
          };

          const parseToBlocks = (rawText) => {
            if (!rawText) return [];
            const blocks = rawText.split(/(?=\b[A-Z0-9]+\/\d{2}\s+(?:VALID:|COMPANY\s+NOTAM))/i);
            const parsed = blocks.filter(b => b.trim()).map(block => {
                const idMatch = block.match(/^([A-Z0-9]+\/\d{2})\s+(?:VALID:|COMPANY\s+NOTAM)/i);
                if (!idMatch) return null; 
                let text = block.trim();
                const headerIndex = text.search(/BR\s+\d{3}\/\d{2}[A-Za-z]{3}\d{2}/i);
                if (headerIndex !== -1 && headerIndex > 20) text = text.substring(0, headerIndex).trim();
                text = text.replace(/\+{5,}\s*[A-Z\s]+\s*\+{5,}/gi, '').trim();
                text = text.replace(/(\n\s*){2,}/g, '\n');
                return { id: idMatch[1], text: text };
            }).filter(Boolean); 

            const mergedMap = new Map();
            parsed.forEach(b => {
                if (mergedMap.has(b.id)) {
                    let existing = mergedMap.get(b.id);
                    if (!existing.text.includes(b.text)) {
                        existing.text += '\n' + b.text;
                    }
                } else {
                    mergedMap.set(b.id, { ...b });
                }
            });
            return Array.from(mergedMap.values());
          };

          const processBriefingText = (text) => {
            const routeMatch = text.match(/([A-Z]{4})\/([A-Z]{4})/);
            const dateMatch = text.match(/(\d{2}[A-Z]{3}\d{2})/i);
            const stdMatch = text.match(/STD\s+\d{4}L\s+(\d{4})Z/i);
            const staMatch = text.match(/STA\s+\d{4}L\s+(\d{4})Z/i);

            if (!routeMatch || !dateMatch || !stdMatch || !staMatch) throw new Error("Missing critical flight info");

            const depAirport = routeMatch[1]; const destAirport = routeMatch[2];
            const stdDate = parseZTime(dateMatch[1], stdMatch[1]); const staDate = parseZTime(dateMatch[1], staMatch[1]);
            if (staDate < stdDate) staDate.setUTCDate(staDate.getUTCDate() + 1);

            const depSectionMatch = text.match(/={3,}\s*DEPARTURE AIRPORT\s*={3,}([\s\S]*?)(?=={3,}\s*DESTINATION AIRPORT\s*={3,})/i);
            const destSectionMatch = text.match(/={3,}\s*DESTINATION AIRPORT\s*={3,}([\s\S]*?)(?=={3,}\s*DESTINATION ALTERNATE\(S\)\s*={3,}|={3,}\s*ENROUTE AIRPORT\(S\)\s*={3,})/i);

            setParsedData({ 
                depAirport, destAirport, std: stdDate, sta: staDate, 
                depBlocks: parseToBlocks(depSectionMatch ? depSectionMatch[1] : ''), 
                destBlocks: parseToBlocks(destSectionMatch ? destSectionMatch[1] : '') 
            });
          };

          const categorizeNotam = (text) => {
            const upperText = text.toUpperCase();
            
            const isClsd = /\b(?:CLSD|CLOSED)\b/.test(upperText);
            if (isClsd) {
                const rwyMatch = upperText.match(/\b(?:RWY|RUNWAY)\b/);
                const twyMatch = upperText.match(/\b(?:TWY|TAXIWAY|TXL|RAMP|APRON|PRKG|PARKING|BAY|STAND)\b/);
                if (rwyMatch && twyMatch) {
                    if (rwyMatch.index < twyMatch.index) return 'RWY_CLSD';
                    else return 'TWY_CLSD';
                } else if (rwyMatch) {
                    return 'RWY_CLSD';
                } else if (twyMatch) {
                    return 'TWY_CLSD';
                }
            }

            if (/\bCOMPANY\s+NOTAM\b/.test(upperText)) return 'COMPANY_NOTAM';
            if (/\b(?:MISSED\s+APPROACH|MISSED\s+APCH|MAPT|MAPC)\b/.test(upperText)) return 'MISSED_APPROACH';
            if (/\b(?:TAKEOFF\s+MINIMUMS?|TAKEOFF\s+MINIMA|TKOF\s+MINIMUMS?|TKOF\s+MINIMA)\b/.test(upperText)) return 'TAKEOFF_MINIMUM';
            
            const isLandingMin = /\b(?:APP\s+MINIMUM|APPROACH\s+MINIMUM|MINIMA|MINIMUMS?|DA\/MDA|OCA\/H|DA\s+\d+|HAT\s+\d+|VISIBILITY\s+RVR|RVR\s+\d+|CAT\s+II|CAT\s+III)\b/.test(upperText) || 
                             /\b(?:ILS|LOC|RNAV|RNP|VOR|NDB|GLS).*RWY.*\b(?:AMDT|ORIG)\b/.test(upperText);
            if (isLandingMin) return 'LANDING_MINIMUM';
            
            if (/\b(?:LGT|LIGHT|LIGHTS|NAV|ILS|VOR|NDB|GP|LOC|DME|PAPI|VASI|ALS|RADAR)\b/.test(upperText) && /\b(?:U\/S|UNSERVICEABLE|OUT\s+OF\s+SERVICE|OTS)\b/.test(upperText)) return 'EQUIP_US';
            if (/\b(?:BIRD|BIRDS|WILDLIFE|FOWL|FLOCK|AVIAN)\b/.test(upperText)) return 'BIRD_HAZARD';
            if (/\b(?:UAS|UNMANNED|DRONE|KITE|BALLOON|FIREWORK|LASER|PARACHUTE|UAV)\b/.test(upperText)) return 'UAS_KITE';
            if (/\b(?:MOWING|GRASS CUTTING|WEED|SWEEPING|LAWN)\b/.test(upperText) && !/\b(?:CLSD|CLOSED)\b/.test(upperText)) return 'MAINTENANCE';
            if (/\b(?:CRANE|CRANES|OBST|OBSTACLE|IRREGULAR\s+SFC|IRREGULAR\s+SURFACE)\b/.test(upperText)) return 'OBSTACLE_ETC';
            
            return 'NORMAL';
          };

          useEffect(() => {
            if (!parsedData) return;
            const { depAirport, destAirport, std, sta, depBlocks, destBlocks } = parsedData;
            
            const processBlocks = (blocks, flightTime) => {
              return blocks.map(block => {
                let { keep, reason } = checkNotamRelevance(block.text, flightTime, bufferHours);
                const category = categorizeNotam(block.text);
                
                if (keep) {
                  if (category === 'OBSTACLE_ETC' && hideObstacles) { keep = false; reason = '依設定自動隱藏 (障礙物/不平整表面)'; }
                  if (category === 'BIRD_HAZARD' && hideBirds) { keep = false; reason = '依設定自動隱藏 (鳥類/野生動物警告)'; }
                  if (category === 'UAS_KITE' && hideUAS) { keep = false; reason = '依設定自動隱藏 (無人機/氣球/煙火活動)'; }
                  if (category === 'MAINTENANCE' && hideMowing) { keep = false; reason = '依設定自動隱藏 (周邊除草/例行維護)'; }
                }

                return { ...block, keep, reason, category };
              });
            };

            setFlightInfo({ depAirport, destAirport, std, sta, depNotams: processBlocks(depBlocks, std), destNotams: processBlocks(destBlocks, sta) });
          }, [parsedData, bufferHours, hideObstacles, hideBirds, hideUAS, hideMowing]);

          const checkNotamRelevance = (notamText, flightTime, buffer) => {
            const winStart = new Date(flightTime.getTime() - buffer * 3600 * 1000);
            const winEnd = new Date(flightTime.getTime() + buffer * 3600 * 1000);

            const validMatch = notamText.match(/VALID:\s*(\d{10})\s*(?:-\s*(\d{10}|PERM|UFN|EST))?/i);
            if (validMatch) {
              const parseDate10 = (str) => new Date(Date.UTC(2000 + parseInt(str.slice(0,2)), parseInt(str.slice(2,4))-1, parseInt(str.slice(4,6)), parseInt(str.slice(6,8)), parseInt(str.slice(8,10))));
              const fromDate = parseDate10(validMatch[1]);
              let toDate = new Date(Date.UTC(2099, 11, 31)); 
              if (validMatch[2] && /^\d{10}$/.test(validMatch[2])) toDate = parseDate10(validMatch[2]);

              if (winEnd < fromDate) return { keep: false, reason: '在航班起飛前尚未生效' };
              if (winStart > toDate) return { keep: false, reason: '在航班到達前已失效' };
            }

            const dailyRegex = /\b(\d{4})Z?\s*-\s*(\d{4})Z?\b/ig;
            let dailyMatch; const dailyRanges = [];
            while ((dailyMatch = dailyRegex.exec(notamText)) !== null) {
              const startMin = parseInt(dailyMatch[1].slice(0,2)) * 60 + parseInt(dailyMatch[1].slice(2,4));
              const endMin = parseInt(dailyMatch[2].slice(0,2)) * 60 + parseInt(dailyMatch[2].slice(2,4));
              if (startMin <= 1440 && endMin <= 1440) dailyRanges.push({ start: startMin, end: endMin, raw: dailyMatch[0] });
            }

            if (dailyRanges.length > 0) {
              let overlaps = false;
              for (let range of dailyRanges) {
                const rStart = new Date(flightTime); rStart.setUTCHours(Math.floor(range.start/60), range.start%60, 0, 0);
                const rEnd = new Date(flightTime); rEnd.setUTCHours(Math.floor(range.end/60), range.end%60, 0, 0);
                if (rEnd < rStart) {
                  rEnd.setUTCDate(rEnd.getUTCDate() + 1);
                  const rStartPrev = new Date(rStart); rStartPrev.setUTCDate(rStartPrev.getUTCDate() - 1);
                  const rEndPrev = new Date(rEnd); rEndPrev.setUTCDate(rEndPrev.getUTCDate() - 1);
                  if ((winStart <= rEndPrev && winEnd >= rStartPrev) || (winStart <= rEnd && winEnd >= rStart)) { overlaps = true; break; }
                } else {
                  if (winStart <= rEnd && winEnd >= rStart) { overlaps = true; break; }
                }
              }
              if (!overlaps) return { keep: false, reason: `每日時間區間不重疊 (${dailyRanges.map(r=>r.raw).join(', ')})` };
            }
            return { keep: true, reason: '符合航班時間' };
          };

          const formatZTime = (date) => `${date.getUTCDate().toString().padStart(2, '0')}${date.toLocaleString('en-US', { month: 'short', timeZone: 'UTC' }).toUpperCase()}${date.getUTCFullYear().toString().slice(-2)} ${date.getUTCHours().toString().padStart(2, '0')}${date.getUTCMinutes().toString().padStart(2, '0')}Z`;

          const FilterControls = () => (
            <div className="flex flex-col gap-3 w-full xl:w-auto mt-4 xl:mt-0 pt-4 xl:pt-0 border-t xl:border-t-0 border-slate-100">
              <div className="flex flex-wrap items-center justify-end gap-2">
                <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 py-1.5 px-3 rounded-lg shadow-sm">
                  <Clock className="w-4 h-4 text-blue-600" />
                  <label className="text-sm font-bold text-slate-700 whitespace-nowrap">過濾彈性時間:</label>
                  <select value={bufferHours} onChange={(e) => setBufferHours(Number(e.target.value))} className="bg-white border border-slate-300 rounded text-sm py-0.5 px-2 font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value={0}>0 小時</option><option value={1}>1 小時 (預設)</option><option value={2}>2 小時</option>
                    <option value={3}>3 小時</option><option value={4}>4 小時</option><option value={6}>6 小時</option>
                  </select>
                </div>
              </div>
              <div className="flex flex-wrap justify-end gap-2">
                <FilterToggle active={hideObstacles} onClick={() => setHideObstacles(!hideObstacles)} icon={MountainSnow} label="障礙物/吊車" activeColorClass="bg-indigo-50 border-indigo-200 text-indigo-700" inactiveColorClass="bg-slate-50 border-slate-200 text-slate-500" dotColor="bg-indigo-500" />
                <FilterToggle active={hideBirds} onClick={() => setHideBirds(!hideBirds)} icon={Bird} label="鳥類/動物" activeColorClass="bg-cyan-50 border-cyan-200 text-cyan-700" inactiveColorClass="bg-slate-50 border-slate-200 text-slate-500" dotColor="bg-cyan-500" />
                <FilterToggle active={hideUAS} onClick={() => setHideUAS(!hideUAS)} icon={SendKite} label="氣球/無人機" activeColorClass="bg-violet-50 border-violet-200 text-violet-700" inactiveColorClass="bg-slate-50 border-slate-200 text-slate-500" dotColor="bg-violet-500" />
                <FilterToggle active={hideMowing} onClick={() => setHideMowing(!hideMowing)} icon={Tractor} label="除草/維護" activeColorClass="bg-lime-50 border-lime-200 text-lime-700" inactiveColorClass="bg-slate-50 border-slate-200 text-slate-500" dotColor="bg-lime-500" />
              </div>
            </div>
          );

          const formatNotamText = (text, isDimmed) => {
            const regex = /(\b(?:RWY|RUNWAY)\s+[0-3]?\d[LRC]?(?:\s*\/\s*[0-3]?\d[LRC]?)?\b|\b(?:TWY|TAXIWAY|TXL)\s+[A-Z0-9]+\b|\bILS(?:(?:\s+OR\s+LOC)?\s+(?:RWY|RUNWAY)?\s*[0-3]?\d[LRC]?)?\b)/gi;
            const parts = text.split(regex);
            
            return parts.map((part, idx) => {
                if (!part) return null;
                const upperPart = part.toUpperCase();
                
                if (/^\b(?:RWY|RUNWAY)\b/.test(upperPart)) {
                    return (
                        <span key={idx} className={`font-black text-black px-1 py-0.5 rounded-md shadow-sm border ${isDimmed ? 'bg-yellow-100/50 border-yellow-200' : 'bg-yellow-200/70 border-yellow-300'}`}>
                            {part}
                        </span>
                    );
                } 
                else if (/^\b(?:TWY|TAXIWAY|TXL)\b/.test(upperPart) || upperPart.startsWith('ILS')) {
                    return (
                        <span key={idx} className={`font-black ${isDimmed ? 'text-slate-600' : 'text-slate-900'}`}>
                            {part}
                        </span>
                    );
                }
                return <Fragment key={idx}>{part}</Fragment>;
            });
          };

          const NotamCard = ({ notam, isSelected, onToggle }) => {
            let borderClass = 'border-slate-200'; let badge = null;
            if (notam.keep || isSelected) {
              if (notam.category === 'RWY_CLSD') { borderClass = 'border-l-4 border-l-rose-500 border-y-rose-200 border-r-rose-200 bg-rose-50/30'; badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-rose-100 text-rose-800 border border-rose-200">🚨 跑道關閉</span>; } 
              else if (notam.category === 'TWY_CLSD') { borderClass = 'border-l-4 border-l-amber-500 border-y-amber-200 border-r-amber-200 bg-amber-50/30'; badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800 border border-amber-200">🚧 滑行道/停機坪關閉</span>; } 
              else if (notam.category === 'COMPANY_NOTAM') { borderClass = 'border-l-4 border-l-teal-500 border-y-teal-200 border-r-teal-200 bg-teal-50/30'; badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-teal-100 text-teal-800 border border-teal-200"><Building className="w-3 h-3 mr-1" /> 公司通報</span>; } 
              else if (notam.category === 'MISSED_APPROACH') { borderClass = 'border-l-4 border-l-purple-500 border-y-purple-200 border-r-purple-200 bg-purple-50/30'; badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800 border border-purple-200"><CornerUpRight className="w-3 h-3 mr-1" /> 誤失進場更改</span>; } 
              else if (notam.category === 'TAKEOFF_MINIMUM') { borderClass = 'border-l-4 border-l-pink-500 border-y-pink-200 border-r-pink-200 bg-pink-50/30'; badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-pink-100 text-pink-800 border border-pink-200"><PlaneTakeoff className="w-3 h-3 mr-1" /> 起飛標準更改</span>; } 
              else if (notam.category === 'LANDING_MINIMUM') { borderClass = 'border-l-4 border-l-fuchsia-500 border-y-fuchsia-200 border-r-fuchsia-200 bg-fuchsia-50/30'; badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-fuchsia-100 text-fuchsia-800 border border-fuchsia-200"><PlaneLanding className="w-3 h-3 mr-1" /> 降落標準更改</span>; } 
              else if (notam.category === 'EQUIP_US') { borderClass = 'border-l-4 border-l-orange-400 border-y-orange-100 border-r-orange-100 bg-orange-50/30'; badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-orange-100 text-orange-800 border border-orange-200"><LightbulbOff className="w-3 h-3 mr-1" /> 設備無法使用</span>; } 
              else if (notam.category === 'OBSTACLE_ETC') { borderClass = 'border-l-4 border-l-indigo-400 border-y-indigo-100 border-r-indigo-100 bg-indigo-50/30'; badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800 border border-indigo-200"><MountainSnow className="w-3 h-3 mr-1" /> 障礙物/不平整</span>; } 
              else if (notam.category === 'BIRD_HAZARD') { borderClass = 'border-l-4 border-l-cyan-400 border-y-cyan-100 border-r-cyan-100 bg-cyan-50/30'; badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-cyan-100 text-cyan-800 border border-cyan-200"><Bird className="w-3 h-3 mr-1" /> 鳥擊/野生動物</span>; } 
              else if (notam.category === 'UAS_KITE') { borderClass = 'border-l-4 border-l-violet-400 border-y-violet-100 border-r-violet-100 bg-violet-50/30'; badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-violet-100 text-violet-800 border border-violet-200"><SendKite className="w-3 h-3 mr-1" /> 無人機/氣球/煙火</span>; } 
              else if (notam.category === 'MAINTENANCE') { borderClass = 'border-l-4 border-l-lime-400 border-y-lime-100 border-r-lime-100 bg-lime-50/30'; badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-lime-100 text-lime-800 border border-lime-200"><Tractor className="w-3 h-3 mr-1" /> 除草/周邊維護</span>; } 
              else { badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 border border-emerald-200"><CheckCircle className="w-3 h-3 mr-1" /> 一般資訊</span>; }
            } else {
              borderClass = 'bg-slate-50 border-slate-200 opacity-70 hover:opacity-100';
              if (notam.reason.includes('障礙物')) badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-medium bg-indigo-50 text-indigo-500 border border-indigo-100"><MountainSnow className="w-3 h-3 mr-1" /> 隱藏的障礙物</span>;
              else if (notam.reason.includes('鳥類')) badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-medium bg-cyan-50 text-cyan-600 border border-cyan-100"><Bird className="w-3 h-3 mr-1" /> 隱藏的動物警告</span>;
              else if (notam.reason.includes('無人機')) badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-medium bg-violet-50 text-violet-600 border border-violet-100"><SendKite className="w-3 h-3 mr-1" /> 隱藏的空中活動</span>;
              else if (notam.reason.includes('除草')) badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-medium bg-lime-50 text-lime-600 border border-lime-100"><Tractor className="w-3 h-3 mr-1" /> 隱藏的除草/維護</span>;
              else badge = <span className="ml-3 inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-medium bg-slate-200 text-slate-600"><XCircle className="w-3 h-3 mr-1" /> 已依時間過濾</span>;
            }

            const isDimmed = !(notam.keep || isSelected);

            return (
              <div className={`p-4 rounded-xl border mb-3 shadow-sm transition-all relative ${borderClass} ${isSelected ? 'ring-2 ring-amber-400 border-amber-400 !opacity-100 bg-amber-50/10' : ''}`}>
                <div className="flex justify-between items-start mb-2 pr-10">
                  <h4 className="font-bold text-slate-800 text-lg flex flex-wrap items-center gap-y-1">
                    {notam.id}{badge}
                  </h4>
                </div>
                
                <button 
                  onClick={onToggle}
                  title={isSelected ? "取消標記" : "標記為重要"}
                  className={`absolute top-4 right-4 p-1.5 rounded-lg transition-all transform active:scale-90 ${isSelected ? 'text-amber-500 bg-amber-100 hover:bg-amber-200 shadow-sm' : 'text-slate-300 hover:text-amber-400 hover:bg-slate-100'}`}
                >
                  <Star className="w-5 h-5" fill={isSelected ? "currentColor" : "none"} />
                </button>

                {isDimmed && <div className="text-sm font-medium mb-2 flex items-center text-slate-500"><AlertTriangle className="w-4 h-4 mr-1.5" />原因: {notam.reason}</div>}
                
                <pre className={`text-sm whitespace-pre-wrap font-mono leading-relaxed ${isDimmed ? 'text-slate-500' : 'text-slate-800'}`}>
                    {formatNotamText(notam.text, isDimmed)}
                </pre>
              </div>
            );
          };

          if (localError) {
            return (
                <div className="max-w-5xl mx-auto px-4 mt-8">
                    <div className="p-4 bg-rose-50 border border-rose-200 rounded-xl text-rose-700 flex items-start gap-3">
                        <AlertTriangle className="w-5 h-5 flex-shrink-0 mt-0.5" /><p className="font-bold">{localError}</p>
                    </div>
                </div>
            );
          }

          if (!flightInfo) return null;

          return (
            <div className="max-w-5xl mx-auto px-4 mt-6 pb-12">
                <div className="space-y-6">
                  <div className="bg-white rounded-2xl shadow-md p-6 border border-slate-200 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6">
                    <div className="flex items-center gap-8 w-full xl:w-auto overflow-x-auto pb-2 xl:pb-0">
                      <div className="shrink-0"><div className="text-sm text-slate-500 font-medium mb-1 flex items-center"><PlaneTakeoff className="w-4 h-4 mr-1.5"/> 起飛 (DEP)</div><div className="text-2xl font-bold text-slate-800">{flightInfo.depAirport}</div><div className="text-sm text-blue-600 font-medium mt-1">STD {formatZTime(flightInfo.std)}</div></div>
                      <div className="w-16 h-px bg-slate-300 relative hidden md:block shrink-0"><div className="absolute right-0 top-1/2 -translate-y-1/2 w-2 h-2 border-t-2 border-r-2 border-slate-400 rotate-45"></div></div>
                      <div className="shrink-0"><div className="text-sm text-slate-500 font-medium mb-1 flex items-center"><PlaneLanding className="w-4 h-4 mr-1.5"/> 降落 (DEST)</div><div className="text-2xl font-bold text-slate-800">{flightInfo.destAirport}</div><div className="text-sm text-blue-600 font-medium mt-1">STA {formatZTime(flightInfo.sta)}</div></div>
                    </div>
                    <FilterControls />
                  </div>
                  
                  <div className="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
                    <div className="flex border-b border-slate-200">
                      <button onClick={() => setActiveTab('DEP')} className={`flex-1 py-4 text-center font-bold text-lg transition-colors ${activeTab === 'DEP' ? 'bg-blue-50 text-blue-700 border-b-2 border-blue-600' : 'text-slate-500 hover:bg-slate-50'}`}>起飛機場 ({flightInfo.depAirport})</button>
                      <button onClick={() => setActiveTab('DEST')} className={`flex-1 py-4 text-center font-bold text-lg transition-colors ${activeTab === 'DEST' ? 'bg-blue-50 text-blue-700 border-b-2 border-blue-600' : 'text-slate-500 hover:bg-slate-50'}`}>降落機場 ({flightInfo.destAirport})</button>
                    </div>
                    <div className="p-6 bg-slate-50 min-h-[500px]">
                      {(() => {
                        const currentNotams = activeTab === 'DEP' ? flightInfo.depNotams : flightInfo.destNotams;
                        
                        const pinnedNotams = currentNotams.filter(n => selectedNotams.includes(n.id));
                        const unpinnedNotams = currentNotams.filter(n => !selectedNotams.includes(n.id));

                        const unpinnedActiveNotams = unpinnedNotams.filter(n => n.keep);
                        const filteredNotams = unpinnedNotams.filter(n => !n.keep);

                        const rwyClsdNotams = unpinnedActiveNotams.filter(n => n.category === 'RWY_CLSD');
                        const twyClsdNotams = unpinnedActiveNotams.filter(n => n.category === 'TWY_CLSD');
                        const compNotams = unpinnedActiveNotams.filter(n => n.category === 'COMPANY_NOTAM');
                        const missedAppNotams = unpinnedActiveNotams.filter(n => n.category === 'MISSED_APPROACH');
                        const takeoffMinNotams = unpinnedActiveNotams.filter(n => n.category === 'TAKEOFF_MINIMUM'); 
                        const landingMinNotams = unpinnedActiveNotams.filter(n => n.category === 'LANDING_MINIMUM'); 
                        const equipUSNotams = unpinnedActiveNotams.filter(n => n.category === 'EQUIP_US');
                        const obstNotams = unpinnedActiveNotams.filter(n => n.category === 'OBSTACLE_ETC');
                        const birdNotams = unpinnedActiveNotams.filter(n => n.category === 'BIRD_HAZARD');
                        const uasNotams = unpinnedActiveNotams.filter(n => n.category === 'UAS_KITE');
                        const maintNotams = unpinnedActiveNotams.filter(n => n.category === 'MAINTENANCE');
                        const normalNotams = unpinnedActiveNotams.filter(n => n.category === 'NORMAL');
                        
                        const activeCount = unpinnedActiveNotams.length + pinnedNotams.length;

                        return (
                          <div>
                            <div className="flex items-center justify-between mb-6">
                              <h3 className="font-bold text-slate-700 text-lg">有效的 NOTAMs ({activeCount})</h3>
                              {filteredNotams.length > 0 && <button onClick={() => setShowFiltered(!showFiltered)} className="flex items-center gap-1 text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors bg-white px-3 py-1.5 rounded border border-slate-200 shadow-sm">{showFiltered ? <ChevronUp className="w-4 h-4"/> : <ChevronDown className="w-4 h-4"/>}{showFiltered ? '隱藏' : '顯示'}已過濾項目 ({filteredNotams.length})</button>}
                            </div>

                            {activeCount === 0 ? (
                              <div className="text-center py-12 text-slate-400 bg-white rounded-xl border border-dashed border-slate-300"><CheckCircle className="w-12 h-12 mx-auto mb-3 opacity-50" /><p>目前設定的時間內，沒有需要注意的 NOTAM</p></div>
                            ) : (
                              <div className="space-y-8">
                                {pinnedNotams.length > 0 && (
                                  <section className="mb-8">
                                    <h4 className="text-amber-600 font-black text-xl mb-3 flex items-center gap-2 border-b-2 border-amber-200 pb-2">
                                      <Star className="w-6 h-6 text-amber-500" fill="currentColor" />
                                      標記的重要資訊 (Pinned) - {pinnedNotams.length} 筆
                                    </h4>
                                    <div className="space-y-3">
                                      {pinnedNotams.map((notam, idx) => (
                                        <NotamCard key={`pinned-${idx}`} notam={notam} isSelected={true} onToggle={() => toggleNotamSelection(notam.id)} />
                                      ))}
                                    </div>
                                  </section>
                                )}

                                {rwyClsdNotams.length > 0 && <section><h4 className="text-rose-700 font-bold text-lg mb-3 flex items-center gap-2 border-b border-rose-200 pb-2"><AlertOctagon className="w-5 h-5" />跑道關閉 (Runway Closed) - {rwyClsdNotams.length} 筆</h4><div>{rwyClsdNotams.map((notam, idx) => <NotamCard key={`rwy-${idx}`} notam={notam} isSelected={false} onToggle={() => toggleNotamSelection(notam.id)} />)}</div></section>}
                                {twyClsdNotams.length > 0 && <section><h4 className="text-amber-700 font-bold text-lg mb-3 flex items-center gap-2 border-b border-amber-200 pb-2"><MapIcon className="w-5 h-5" />滑行道/停機坪關閉 (Taxiway/Apron Closed) - {twyClsdNotams.length} 筆</h4><div>{twyClsdNotams.map((notam, idx) => <NotamCard key={`twy-${idx}`} notam={notam} isSelected={false} onToggle={() => toggleNotamSelection(notam.id)} />)}</div></section>}

        const parseOFP = (text) => {

                if (depMatch) { data.tkofRwy = depMatch[1]; let afterDep = text.substring(navLogStart + depMatch.index, navLogStart + depMatch.index + 1000); let words = afterDep.split(/[\s\n]+/); for (let w of words) { if (/^[A-Z]{3,6}\d{1,2}[A-Z]?$/.test(w)) { data.sid = w; break; } } }

        const highlightTAF = (wxText, windows, targetMins, targetType, baseDate) => {

        function OfpSummaryApp({ rawText, onOfpDataUpdate }) {

          const [selectedThreats, setSelectedThreats] = useState([]);

          useEffect(() => {
            window.scrollTo({ top: 0, behavior: 'instant' });
          }, [activeMainTab]);

          useEffect(() => {
            const handleScroll = () => setShowTopBtn(window.scrollY > 300);
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

          const handleGlobalFileUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;

            setGlobalLoading(true);
            setGlobalError(null);
            
            setTimeout(async () => {
              try {
                const pdfjsLib = window.pdfjsLib;
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = '';
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i); 
                    const content = await page.getTextContent();
                    let linesMap = new Map();
                    content.items.forEach(item => { 
                        let y = Math.round(item.transform[5] / 4) * 4; 
                        if (!linesMap.has(y)) linesMap.set(y, []); 
                        linesMap.get(y).push(item); 
                    });
                    let yKeys = Array.from(linesMap.keys()).sort((a, b) => b - a);
                    let pageText = yKeys.map(y => {
                        let lineItems = linesMap.get(y); lineItems.sort((a, b) => a.transform[4] - b.transform[4]);
                        let lineStr = ''; let lastX = -1;
                        lineItems.forEach(it => { 
                            if (lastX !== -1 && (it.transform[4] - lastX > 10)) lineStr += ' '; 
                            lineStr += it.str; lastX = it.transform[4] + it.width; 
                        });
                        return lineStr.trim();
                    }).join('\n'); 
                    fullText += pageText + '\n';
                }
                setSharedRawText(fullText);
              } catch (err) {
                console.error("Global PDF Error:", err);
                setGlobalError("讀取 PDF 失敗，請確認是否為有效 LIDO 文件。");
              } finally {
                setGlobalLoading(false);
              }
            }, 50);
          };

          const handleReset = () => {
            setSharedRawText(null);
            setGlobalError(null);
            setActiveMainTab('OFP');
            setOfpExportData(null);
            setPinnedNotamsExport([]);

            setWaterQuantity('');
            setCustomNote('');
            setSelectedThreats([]);
          };

              setSelectedThreats(prev => {
                  const exists = prev.find(t => t.category === category && t.item === item);

              if (!wxData) return { wind, temp, qnh };
              const aptWx = wxData.find(w => w.icao === icao);
              if (!aptWx || !aptWx.raw) return { wind, temp, qnh };
              
              const lines = aptWx.raw.split('\n');
              for (const line of lines) {
                  if (wind === 'N/A') {
                      const windMatch = line.match(/\b(\d{3}|VRB)\d{2,3}(G\d{2,3})?(KT|MPS)\b/);
                      if (windMatch) wind = windMatch[0];
                  }
                  if (temp === 'N/A') {
                      const tempMatch = line.match(/\b(M?\d{2})\/(M?\d{2}|[/]{2})\b/);
                      if (tempMatch) {

                  if (qnh === 'N/A') {
                      const qnhMatch = line.match(/\b([AQ]\d{4})\b/);

                  'VVNB': { zh: '河內', en: 'Hanoi' },
                  'EGLL': { zh: '倫敦', en: 'London' },
                  'LFPG': { zh: '巴黎', en: 'Paris' },
                  'EHAM': { zh: '阿姆斯特丹', en: 'Amsterdam' },
                  'LOWW': { zh: '維也納', en: 'Vienna' },
                  'EDDM': { zh: '慕尼黑', en: 'Munich' },
                  'LIMC': { zh: '米蘭', en: 'Milan' },
                  'YSSY': { zh: '雪梨', en: 'Sydney' },
                  'YBBN': { zh: '布里斯本', en: 'Brisbane' },
                  'RKSI': { zh: '首爾仁川', en: 'Seoul Incheon' },
                  'RKSS': { zh: '首爾金浦', en: 'Seoul Gimpo' }
              };
              
              const city = map[icao];
              if (!city) return icao;
              
              if (lang === 'zh') return `${city.zh}國際機場`;
              return `${city.en} International Airport`;
          };

          const getPaText = () => {
              let fltNum = '___', depIcao = '', arrIcao = '', hr = '___', min = '___', alt = '______';
              let tempC = '___', tempF = '___', staAmPm = '________', staLocalFormatted = '________';
              
              if (ofpExportData) {
                  const d = ofpExportData;
                  if (d.flightNo) fltNum = d.flightNo.replace(/[^\d]/g, '');
                  if (d.depIcao) depIcao = d.depIcao;
                  if (d.arrIcao) arrIcao = d.arrIcao;
                  
                  if (d.flightTime && d.flightTime.includes(':')) {
                      const parts = d.flightTime.split(':');
                      hr = parseInt(parts[0], 10);
                      min = parseInt(parts[1], 10);
                  }
                  
                  if (d.fl) {
                      const m = d.fl.match(/FL(\d{3})/i);
                      if (m) alt = parseInt(m[1]) * 100;
                  }
                  
                  if (d.staL && d.staL.length >= 4) {
                      const h = parseInt(d.staL.substring(0, 2));
                      const mStr = d.staL.substring(2, 4);
                      const isPM = h >= 12;
                      const ampmEn = isPM ? 'PM' : 'AM';
                      const h12 = h % 12 || 12;
                      staAmPm = `${h12}:${mStr} ${ampmEn}`;
                      staLocalFormatted = `${h12}:${mStr}`;
                  }
                  
                  const arrWx = extractWeatherInfo(d.weather, d.arrIcao);
                  if (arrWx.temp !== 'N/A') {
                      const tVal = parseInt(arrWx.temp.replace('°C', ''));
                      if (!isNaN(tVal)) {
                          tempC = tVal;
                          tempF = Math.round(tVal * 9 / 5 + 32);
                      }
                  }
              }

              const depZh = depIcao ? getAirportFullName(depIcao, 'zh') : '____';
              const arrZh = arrIcao ? getAirportFullName(arrIcao, 'zh') : '____';
              const depEn = depIcao ? getAirportFullName(depIcao, 'en') : '____';
              const arrEn = arrIcao ? getAirportFullName(arrIcao, 'en') : '____';

              return `=========================================
Welcome PA
=========================================

各位貴賓早/午/晚安，僅代表機長與全體組員歡迎您搭乘長榮航空編號BR ${fltNum} 號班機，由 ${depZh} 飛往 ${arrZh}。本次飛行時間預計為 ${hr}小時${min}分，計畫巡航高度為 ${alt} 英呎。 沿途天氣大致穩定/可能會穿越到不穩定氣流區。航程中當繫緊安全帶指示燈號亮起時，請您留在座位上並繫緊安全帶。 

目的地機場目前天氣狀況：良好/晴天/涼爽/多雲/下雨/起霧/風勢強勁/下雪，溫度為攝氏 ${tempC} 度或華氏 ${tempF} 度。即將抵達目的地機場時，會再做進一步的天氣資訊更新。

本班機的地面作業將在幾分鐘後完成，並開始後推啟程，在此先預祝各位貴賓有個愉快的飛行旅程，謝謝。

Dear passengers, Good (morning, afternoon, evening), this is your first officer speaking from the flight deck. On behalf of the captain and all the crew, WELCOME aboard EVA AIR flight BR ${fltNum}, departing from ${depEn} to ${arrEn}.
We should be ready for departure in a few minutes. Our flight time today is ${hr} hours and ${min} minutes, with an initial cruising altitude of ${alt} feet.
好天氣 The enroute weather seems fine; however,
壞天氣 For the weather enroute. We might fly through some turbulent area.
If you see the fasten seatbelt sign being turned on, for your safety, please remain seated and fasten on your seatbelt.
Now please make yourself comfortable and enjoy the flight with us. Once again, welcome aboard.





=========================================
Descent PA
=========================================

各位貴賓早安/午安/晚安，這是副機長再次廣播。我們正巡航在 ${alt} 英呎高空，距離目的地 ${arrZh} 約 ______ 海哩，預計將在10分鐘之後開始下降高度準備落地，於當地時間 ____月____號 上午/下午/晚間 ${staLocalFormatted} 抵達 ${arrZh}，____和____有____小時的時差，目前當地時間為_______。 

根據最新天氣資訊，目的地機場現在天氣狀況良好/晴天/多雲/起霧/風勢強勁/溼冷/乾冷/涼爽/正在下雨/下雪，地面溫度為攝氏 ${tempC} 度/華氏 ${tempF} 度。   

（極端天氣如颱風的補充：由於天氣/颱風/鋒面的影響，待會下降過程中，可能會有非常顛波的情況，請務必留在座位上並繫緊安全帶。）

感謝您選擇長榮航空，希望這趟飛行讓您感到滿意，並期待在不久的將來，還有機會能為您服務。謹代表全體組員預祝各位貴賓旅途愉快。謝謝。

Ladies and gentlemen, this is your first officer speaking from the flight deck.
We are approaching to ${arrEn} and expecting to start our descent within about 10 minutes.
The estimated time of arrival at ${arrEn} will be ${staAmPm} and the current local time is __________.
【ONLY IF DELAY EXPECTED】
【 ${arrEn} is very busy at the moment. We may be delayed up to __________minutes before landing.】
The present weather at the airport is (clear, partly cloudy, cloudy, raining, snowing, winding) with a temperature of ${tempC} degrees Celsius or ${tempF} degrees Fahrenheit. During the descent, we will fly through some turbulent area, please remain seated and fasten on your seatbelt.
We certainly hope that you have enjoyed the flight with us, and we look forward to having you on board for another EVA flight again very soon. Thank you, and wish you all a wonderful day.`;
          };

          const getExportText = () => {
              let text = "";

              if (ofpExportData) {
                  const d = ofpExportData;
                  text += `[FLIGHT] ${d.flightNo || 'N/A'} | ${d.route || 'N/A'} | ${d.date || 'N/A'}\n`;
                  text += `[A/C] Reg: ${d.reg || 'N/A'} ${d.fleetInfo ? `(${d.fleetInfo})` : ''}\n`;
                  text += `BAY: ${parkingBay || '      '} | WATER: ${waterQuantity || '      '}\n`;
                  
                  if (customNote.trim() !== '') {
                      text += `NOTE: ${customNote}\n\n`;
                  } else {
                      text += `\n`;
                  }

                  text += `🕒 TIMINGS (ZULU / LCL)\n`;
                  text += `STD: ${d.stdZ || 'N/A'} (${d.stdL || 'N/A'})\n`;
                  text += `STA: ${d.staZ || 'N/A'} (${d.staL || 'N/A'})\n`;
                  text += `BLK: ${d.blockTime || 'N/A'} | FLT: ${d.flightTime || 'N/A'}\n\n`;

                  text += `⚖️ WEIGHTS & PERF\n`;
                  text += `ZFW: ${d.zfwPlanned || 'N/A'} (LMT: ${d.zfwLimit || 'N/A'})\n`;
                  text += `LDW: ${d.ldwPlanned || 'N/A'} (LMT: ${d.ldwLimit || 'N/A'})\n`;
                  text += `TOW: ${d.towPlanned || 'N/A'} (LMT: ${d.towLimit || 'N/A'})\n`;
                  text += `FUEL: ${d.totalFuel || 'N/A'} | ALTN+RES: ${d.reserveFuelSum || 'N/A'}\n`;
                  text += `CI: ${d.ci || 'N/A'} | FL: ${d.fl || 'N/A'}\n\n`;

                  const depWx = extractWeatherInfo(d.weather, d.depIcao);
                  text += `🛫 DEPARTURE (${d.depIcao || 'N/A'})\n`;
                  text += `RWY: ${d.tkofRwy || 'N/A'} | SID: ${d.sid || 'N/A'}\n`;
                  text += `WIND: ${depWx.wind} | TEMP: ${depWx.temp} | QNH: ${depWx.qnh}\n\n`;

                  const arrWx = extractWeatherInfo(d.weather, d.arrIcao);
                  text += `🛬 ARRIVAL (${d.arrIcao || 'N/A'})\n`;
                  text += `RWY: ${d.ldgRwy || 'N/A'} | STAR: ${d.star || 'N/A'}\n`;
                  text += `WIND: ${arrWx.wind} | TEMP: ${arrWx.temp} | QNH: ${arrWx.qnh}\n\n`;
              } else {
                  text += "OFP 資料尚未準備好或解析失敗。\n\n";
              }

              // 新增：匯出選取的 Threats
              if (selectedThreats.length > 0) {
                  text += `⚠️ THREATS & MITIGATION\n`;
                  text += `-----------------------------------------\n`;
                  const groupedThreats = {};
                  selectedThreats.forEach(t => {
                      if (!groupedThreats[t.category]) groupedThreats[t.category] = [];
                      groupedThreats[t.category].push(t.item);
                  });
                  Object.keys(groupedThreats).forEach(cat => {
                      text += `[${cat}]: ${groupedThreats[cat].join(', ')}\n`;
                  });
                  text += `-----------------------------------------\n\n`;
              }

              text += `⭐ PINNED NOTAMS (${pinnedNotamsExport.length} 筆)\n`;
              text += `-----------------------------------------\n`;
              if (pinnedNotamsExport.length === 0) {
                  text += `(目前無標記的重要 NOTAM)\n`;
              } else {
                  pinnedNotamsExport.forEach((n, i) => {
                      text += `[${n.id}]\n${n.text}\n`;
                      if (i < pinnedNotamsExport.length - 1) text += `\n`;
                  });
              }
              text += `-----------------------------------------\n`;
              return text;
          };

          return (
            <div className="min-h-screen font-sans flex flex-col bg-slate-200">
              {!sharedRawText ? (
                  <div className="flex-1 flex flex-col items-center justify-center p-6">
                      <div className="max-w-xl w-full bg-white p-10 rounded-2xl shadow-xl border border-slate-200 text-center">
                          <div className="flex justify-center mb-6 gap-4 text-blue-600">
                              <AlertTriangle className="w-12 h-12" />
                              <FileText className="w-12 h-12 text-emerald-500" />
                          </div>
                          <h1 className="text-3xl font-black mb-2 text-slate-800">LIDO OFP 助理</h1>
                          <p className="text-slate-500 font-medium mb-8">NOTAM 篩選與 OFP 天氣摘要</p>

                          <label className={`relative cursor-pointer bg-blue-600 text-white px-6 py-5 rounded-xl font-bold hover:bg-blue-700 transition-all flex flex-col items-center justify-center gap-3 w-full shadow-lg shadow-blue-600/20 ${globalLoading ? 'opacity-70 pointer-events-none' : ''}`}>
                              {globalLoading ? (
                                  <><Clock className="w-8 h-8 animate-spin"/> <span className="text-lg">系統解析中，請稍候...</span></>
                              ) : (
                                  <><UploadCloud className="w-10 h-10" /> <span className="text-lg tracking-wide">選擇 LIDO OFP 檔案 (PDF)</span></>
                              )}
                              <input type="file" accept="application/pdf" className="hidden" onChange={handleGlobalFileUpload} disabled={globalLoading} />
                          </label>

                          {globalError && (
                              <div className="mt-6 p-4 bg-rose-50 border border-rose-200 rounded-xl text-rose-700 flex items-start gap-3 text-left">
                                  <AlertTriangle className="w-5 h-5 flex-shrink-0 mt-0.5" />
                                  <p className="font-bold">{globalError}</p>
                              </div>
                          )}
                      </div>
                  </div>
              ) : (
                  <Fragment>
                      <nav className="bg-slate-900 shadow-lg sticky top-0 z-50 border-b border-slate-800">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col lg:flex-row justify-between items-center gap-4">
                          <div className="flex flex-wrap justify-center gap-2">
                              <button onClick={() => setActiveMainTab('OFP')} className={`px-4 sm:px-5 py-2 sm:py-2.5 rounded-full font-bold text-sm transition-all flex items-center gap-2 ${activeMainTab === 'OFP' ? 'bg-emerald-600 text-white shadow-[0_0_15px_rgba(16,185,129,0.5)]' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-200'}`}>
                                <FileText className="w-4 h-4 hidden sm:block" /> OFP 摘要
                              </button>
                              <button onClick={() => setActiveMainTab('NOTAM')} className={`px-4 sm:px-5 py-2 sm:py-2.5 rounded-full font-bold text-sm transition-all flex items-center gap-2 ${activeMainTab === 'NOTAM' ? 'bg-blue-600 text-white shadow-[0_0_15px_rgba(37,99,235,0.5)]' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-200'}`}>
                                <AlertTriangle className="w-4 h-4 hidden sm:block" /> NOTAM 篩選
                              </button>
                              <button onClick={() => setActiveMainTab('THREATS')} className={`px-4 sm:px-5 py-2 sm:py-2.5 rounded-full font-bold text-sm transition-all flex items-center gap-2 ${activeMainTab === 'THREATS' ? 'bg-amber-600 text-white shadow-[0_0_15px_rgba(217,119,6,0.5)]' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-200'}`}>
                                <Shield className="w-4 h-4 hidden sm:block" /> 威脅評估
                              </button>
                          </div>
                          
                          <div className="flex flex-wrap justify-center gap-2 sm:gap-3">
                              <button onClick={() => setShowPaModal(true)} className="text-sm font-bold text-blue-400 hover:text-blue-300 transition-colors bg-slate-800 px-4 py-2 rounded-full border border-blue-700/50 flex items-center gap-2">
                                  <Mic className="w-4 h-4" /> PA 廣播稿
                              </button>
                              <button onClick={() => setShowExportModal(true)} className="text-sm font-bold text-emerald-400 hover:text-emerald-300 transition-colors bg-slate-800 px-4 py-2 rounded-full border border-emerald-700/50 flex items-center gap-2">
                                  <Clipboard className="w-4 h-4" /> 匯出精華版
                              </button>
                              <button onClick={handleReset} className="text-sm font-bold text-slate-400 hover:text-white transition-colors bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                                  重新上傳
                              </button>
                          </div>
                        </div>
                      </nav>

                      <div className={`flex-1 ${activeMainTab === 'OFP' ? 'block' : 'hidden'}`}>
                        <OfpSummaryApp rawText={sharedRawText} onOfpDataUpdate={setOfpExportData} />
                      </div>
                      <div className={`flex-1 ${activeMainTab === 'NOTAM' ? 'block' : 'hidden'}`}>
                        <NotamFilterApp rawText={sharedRawText} onPinnedUpdate={setPinnedNotamsExport} />
                      </div>
                      <div className={`flex-1 ${activeMainTab === 'THREATS' ? 'block' : 'hidden'}`}>
                        <ThreatsApp selectedThreats={selectedThreats} onToggle={handleThreatToggle} />
                      </div>
                  </Fragment>
              )}

              {/* === PA 廣播稿彈出視窗 === */}
              {showPaModal && (
                  <div className="fixed inset-0 z-[1000] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden animate-[fadeIn_0.2s_ease-out]">
                          <div className="flex justify-between items-center p-4 border-b border-slate-200 bg-slate-50">
                              <h3 className="font-black text-xl text-slate-800 flex items-center gap-2">
                                  <Mic className="w-6 h-6 text-blue-600" />
                                  PA 廣播稿 (自動填入版本)
                              </h3>
                              <button onClick={() => setShowPaModal(false)} className="text-slate-400 hover:bg-slate-200 hover:text-slate-700 p-1.5 rounded-full transition-colors">
                                  <XCircle className="w-6 h-6" />
                              </button>
                          </div>
                          
                          <div className="p-4 flex-1 overflow-auto bg-slate-100/50">
                              <textarea
                                  readOnly
                                  value={getPaText()}
                                  className="w-full h-full min-h-[50vh] p-4 font-mono text-sm leading-relaxed text-slate-800 bg-white border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 whitespace-pre"
                              />
                          </div>
                          
                          <div className="p-4 border-t border-slate-200 bg-slate-50 flex flex-wrap justify-end gap-3">
                              <button onClick={() => {
                                  const text = getPaText();
                                  navigator.clipboard.writeText(text).then(() => alert('已複製到剪貼簿！')).catch(() => {
                                      const textArea = document.createElement("textarea");
                                      textArea.value = text; document.body.appendChild(textArea); textArea.select();
                                      try { document.execCommand('copy'); alert('已複製到剪貼簿！'); } catch (e) { alert('複製失敗，請手動選取複製'); }
                                      document.body.removeChild(textArea);
                                  });
                              }} className="flex items-center justify-center gap-2 px-6 py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition-all">
                                  <Clipboard className="w-5 h-5" /> 複製廣播稿
                              </button>
                          </div>
                      </div>
                  </div>
              )}

              {/* === 匯出精華版彈出視窗 === */}
              {showExportModal && (
                  <div className="fixed inset-0 z-[1000] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden animate-[fadeIn_0.2s_ease-out]">
                          <div className="flex justify-between items-center p-4 border-b border-slate-200 bg-slate-50">
                              <h3 className="font-black text-xl text-slate-800 flex items-center gap-2">
                                  <Clipboard className="w-6 h-6 text-emerald-600" />
                                  駕駛艙精華版 (Cockpit Summary)
                              </h3>
                              <button onClick={() => setShowExportModal(false)} className="text-slate-400 hover:bg-slate-200 hover:text-slate-700 p-1.5 rounded-full transition-colors">
                                  <XCircle className="w-6 h-6" />
                              </button>
                          </div>
                          
                          <div className="p-4 border-b border-slate-200 bg-white flex flex-col gap-4">
                              <div className="flex flex-col sm:flex-row gap-4">
                                  <div className="flex-1">
                                      <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">停機坪 (Parking Bay)</label>
                                      <input
                                          type="text"
                                          value={parkingBay}
                                          onChange={e => setParkingBay(e.target.value)}
                                          placeholder="例如: D6"
                                          className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                      />
                                  </div>
                                  <div className="flex-1">
                                      <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">水量 (Water QTY)</label>
                                      <input
                                          type="text"
                                          value={waterQuantity}
                                          onChange={e => setWaterQuantity(e.target.value)}
                                          placeholder="例如: 100%"
                                          className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                      />
                                  </div>
                              </div>
                              <div>
                                  <label className="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">備註 (Note)</label>
                                  <input
                                      type="text"
                                      value={customNote}
                                      onChange={e => setCustomNote(e.target.value)}
                                      placeholder="填寫其他重要事項或交接重點..."
                                      className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                  />
                              </div>
                          </div>
                          
                          <div className="p-4 flex-1 overflow-auto bg-slate-100/50">
                              <textarea
                                  readOnly
                                  value={getExportText()}
                                  className="w-full h-full min-h-[40vh] p-4 font-mono text-sm leading-relaxed text-slate-800 bg-white border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 whitespace-pre"
                              />
                          </div>
                          
                          <div className="p-4 border-t border-slate-200 bg-slate-50 flex flex-wrap justify-end gap-3">
                              <button onClick={() => {
                                  const text = getExportText();
                                  navigator.clipboard.writeText(text).then(() => alert('已複製到剪貼簿！')).catch(() => {
                                      const textArea = document.createElement("textarea");
                                      textArea.value = text; document.body.appendChild(textArea); textArea.select();
                                      try { document.execCommand('copy'); alert('已複製到剪貼簿！'); } catch (e) { alert('複製失敗，請手動選取複製'); }
                                      document.body.removeChild(textArea);
                                  });
                              }} className="flex items-center justify-center gap-2 px-6 py-2.5 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 active:scale-95 transition-all">
                                  <Clipboard className="w-5 h-5" /> 複製純文字
                              </button>
                          </div>
                      </div>
                  </div>
              )}

              {showTopBtn && (
                <button 
                  onClick={scrollToTop} 
                  className="fixed bottom-8 right-8 sm:bottom-12 sm:right-12 bg-slate-800 text-white p-3 sm:px-5 sm:py-3.5 rounded-full shadow-[0_10px_25px_rgba(0,0,0,0.5)] hover:bg-slate-700 hover:-translate-y-1 transition-all duration-300 z-[999] opacity-90 hover:opacity-100 flex items-center gap-2" 
                  title="回到最上方"
                >
                  <ChevronUp className="w-6 h-6" />
                  <span className="hidden sm:inline font-bold tracking-wider">TOP</span>
                </button>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
